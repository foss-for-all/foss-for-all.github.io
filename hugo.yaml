# Hugo configuration file
title: FOSS for All


enableGitInfo: false
hasCJKLanguage: true
# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra
  # Mount Korean content under English so untranslated pages fall back to KO.
  # NOTE: `lang:` was deprecated in Hugo v0.153 in favor of `sites.matrix`,
  # but the new API does not yet replicate the "force-mount as another language"
  # behavior we need here. Revisit once Hugo provides a working migration path.
  mounts:
    - source: content
      target: content
    - source: content
      target: content
      lang: en

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

defaultContentLanguage: ko
languages:
  ko:
    label: 한국어(Korean)
    weight: 1
    menu:
      main:
        - name: 소개
          pageRef: /about
          weight: 1
          identifier: menu_about
        - name: 문서
          pageRef: /docs
          weight: 2
          identifier: menu_docs
        - name: 소식/공고
          pageRef: /blog
          weight: 3
          identifier: menu_news
        - name: 공시/규정
          pageRef: /disclosures
          weight: 4
          identifier: menu_disclosures
        - name: 후원하기
          pageRef: /donate
          weight: 5
          identifier: menu_donate
        - name: 검색
          weight: 6
          params:
            type: search
        - name: GitHub
          weight: 7
          url: "https://github.com/foss-for-all"
          params:
            icon: github
        - weight: 100
          identifier: menu_lang
          params:
            type: language-switch

  en:
    label: English
    weight: 2
    menu:
      main:
        - name: About
          pageRef: /about
          weight: 1
          identifier: menu_about
        - name: Docs
          pageRef: /docs
          weight: 2
          identifier: menu_docs
        - name: Blog
          pageRef: /blog
          weight: 3
          identifier: menu_news
        - name: Disclosures
          pageRef: /disclosures
          weight: 4
          identifier: menu_disclosures
        - name: Donate
          pageRef: /donate
          weight: 5
          identifier: menu_donate
        - name: Search
          weight: 6
          params:
            type: search
        - name: GitHub
          weight: 7
          url: "https://github.com/foss-for-all"
          params:
            icon: github
        - weight: 100
          identifier: menu_lang
          params:
            type: language-switch

params:
  images:
    - /images/f4a-social-card.png
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: favicon.svg
      dark: favicon-dark.svg
      link: /
      width: 25
      height: 20

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/foss-for-all/foss-for-all.github.io/edit/main/content"
